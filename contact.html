<!DOCTYPE html>
<html lang="en" data-theme="bright">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Nati through various social platforms. Connect via email, Instagram, Facebook, or GitHub for collaborations, questions, or project inquiries.">
    <title>Contact - Nati</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="logo">NATI</a>
        <div class="nav-controls">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="theme-toggle-icon">🌙</span>
            </button>
            <div class="dropdown">
                <button class="dropbtn">MENU ☰</button>
                <div class="dropdown-content">
                    <a href="index.html">HOME</a>
                    <a href="portfolio.html">PORTFOLIO</a>
                    <a href="blog.html">BLOG</a>
                    <a href="contact.html">CONTACT</a>
                </div>
            </div>
        </div>
    </div>

    <main class="contact-container">
        <h1>CONTACT</h1>
        
        <div class="contact-content">
            <div class="contact-info">
                <p>Feel free to reach out through any of these platforms:</p>
                
                <div class="social-links">
                    <a href="mailto:xingencai060@gmail.com" class="social-link email">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <span>Email</span>
                    </a>

                    <a href="https://www.facebook.com/profile.php?id=100089793459814" target="_blank" class="social-link facebook">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                        </svg>
                        <span>Facebook</span>
                    </a>

                    <a href="https://instagram.com/ntsuki.23" target="_blank" class="social-link instagram">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                        </svg>
                        <span>Instagram</span>
                    </a>

                    <a href="https://github.com/mitsuki1223" target="_blank" class="social-link github">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                        </svg>
                        <span>GitHub</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <style>
        .contact-container {
            padding: 120px 5% 50px;
            max-width: 800px;
            margin: 0 auto;
        }

        .contact-container h1 {
            text-align: center;
            margin-bottom: 60px;
        }

        .contact-content {
            animation: fadeIn 0.5s ease-out;
        }

        .contact-info {
            text-align: center;
            margin-top: 20px;
        }

        .contact-info p {
            font-size: 1.1em;
            color: var(--gray-text);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 300px;
            margin: 0 auto;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            background: var(--darker-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--light-text);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .social-link svg {
            width: 24px;
            height: 24px;
        }

        .social-link span {
            font-size: 1.1em;
        }

        /* Platform-specific colors on hover */
        .social-link.email:hover {
            color: #EA4335;
            border-color: #EA4335;
        }

        .social-link.github:hover {
            color: #6e5494;
            border-color: #6e5494;
        }

        .social-link.instagram:hover {
            color: #E4405F;
            border-color: #E4405F;
        }

        .social-link.facebook:hover {
            color: #1877F2;
            border-color: #1877F2;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-container {
                padding: 100px 20px 50px;
            }

            .contact-info h2 {
                font-size: 1.8em;
            }

            .contact-info p {
                font-size: 1em;
            }

            .social-link {
                padding: 12px 20px;
            }
        }
    </style>
    <script src="theme.js"></script>
</body>
</html>
