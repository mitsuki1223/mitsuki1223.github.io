<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Nati</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="logo">NATI</a>
        <div class="dropdown">
            <button class="dropbtn">MENU ☰</button>
            <div class="dropdown-content">
                <a href="index.html">HOME</a>
                <a href="portfolio.html">PORTFOLIO</a>
                <a href="blog.html">BLOG</a>
                <a href="contact.html">CONTACT</a>
            </div>
        </div>
    </div>

    <main class="contact-container">
        <h1>CONTACT</h1>
        
        <div class="contact-content">
            <div class="contact-info">
                <p>Feel free to reach out through any of these platforms:</p>
                
                <div class="social-links">
                    <a href="mailto:your.email@example.com" class="social-link email">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <span>Email</span>
                    </a>

                    <a href="https://facebook.com/yourusername" target="_blank" class="social-link facebook">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                        </svg>
                        <span>Facebook</span>
                    </a>

                    <a href="https://instagram.com/yourusername" target="_blank" class="social-link instagram">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                        </svg>
                        <span>Instagram</span>
                    </a>

                    <a href="https://youtube.com/c/yourusername" target="_blank" class="social-link youtube">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"/>
                            <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/>
                        </svg>
                        <span>YouTube</span>
                    </a>

                    <a href="https://github.com/yourusername" target="_blank" class="social-link github">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                        </svg>
                        <span>GitHub</span>
                    </a>

                    <a href="https://linkedin.com/in/yourusername" target="_blank" class="social-link linkedin">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                            <rect x="2" y="9" width="4" height="12"/>
                            <circle cx="4" cy="4" r="2"/>
                        </svg>
                        <span>LinkedIn</span>
                    </a>

                    <a href="https://twitter.com/yourusername" target="_blank" class="social-link twitter">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
                        </svg>
                        <span>Twitter</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <style>
        .contact-container {
            padding: 120px 5% 50px;
            max-width: 800px;
            margin: 0 auto;
        }

        .contact-container h1 {
            text-align: center;
            margin-bottom: 60px;
        }

        .contact-content {
            animation: fadeIn 0.5s ease-out;
        }

        .contact-info {
            text-align: center;
            margin-top: 20px;
        }

        .contact-info p {
            font-size: 1.1em;
            color: var(--gray-text);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 300px;
            margin: 0 auto;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            background: var(--darker-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--light-text);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .social-link svg {
            width: 24px;
            height: 24px;
        }

        .social-link span {
            font-size: 1.1em;
        }

        /* Platform-specific colors on hover */
        .social-link.email:hover {
            color: #EA4335;
            border-color: #EA4335;
        }

        .social-link.github:hover {
            color: #6e5494;
            border-color: #6e5494;
        }

        .social-link.linkedin:hover {
            color: #0077B5;
            border-color: #0077B5;
        }

        .social-link.twitter:hover {
            color: #1DA1F2;
            border-color: #1DA1F2;
        }

        .social-link.facebook:hover {
            color: #1877F2;
            border-color: #1877F2;
        }

        .social-link.instagram:hover {
            color: #E4405F;
            border-color: #E4405F;
        }

        .social-link.youtube:hover {
            color: #FF0000;
            border-color: #FF0000;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-container {
                padding: 100px 20px 50px;
            }

            .contact-info h2 {
                font-size: 1.8em;
            }

            .contact-info p {
                font-size: 1em;
            }

            .social-link {
                padding: 12px 20px;
            }
        }
    </style>
</body>
</html>
