<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore Nati's blog for insights on technology, design, and development. Read the latest articles and stay updated with industry trends.">
    <title>Blog - Nati</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="logo">NATI</a>
        <div class="dropdown">
            <button class="dropbtn">MENU ☰</button>
            <div class="dropdown-content">
                <a href="index.html">HOME</a>
                <a href="portfolio.html">PORTFOLIO</a>
                <a href="blog.html">BLOG</a>
                <a href="contact.html">CONTACT</a>
            </div>
        </div>
    </div>

    <main class="blog-container">
        <h1>BLOG</h1>
        
        <div class="blog-controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search posts...">
            </div>
            
            <div class="filter-sort-controls">
                <select id="categoryFilter" class="control-item">
                    <option value="all">All Categories</option>
                </select>

                <select id="sortSelect" class="control-item">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                </select>
            </div>
        </div>

        <div id="loading" class="loading">Loading posts...</div>
        <div id="blog-grid" class="blog-grid"></div>
        <div id="noResults" class="no-results"></div>
    </main>

    <script>
        // Updated Sheet ID for blog posts
        const SHEET_ID = '100TLkLsHPkkO8lxyZHeCdK1mtbwbR1Z6VmbdrUrSsA8';
        const SHEET_NAME = 'Sheet1'; // Changed back to Sheet1 if that's your sheet name
        const GOOGLE_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
        
        let allPosts = [];
        const categories = new Set();

        async function loadPosts() {
            const loadingDiv = document.getElementById('loading');
            const blogGrid = document.getElementById('blog-grid');

            try {
                const response = await fetch(GOOGLE_SHEET_URL);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47).slice(0, -2));
                
                // Skip the first row (header) and map the rest
                allPosts = jsonData.table.rows.slice(1).map(row => ({
                    id: row.c[0]?.v,
                    title: row.c[1]?.v,
                    preview: row.c[2]?.v,
                    content: row.c[3]?.v,
                    date: row.c[4]?.v,
                    category: row.c[5]?.v
                }));

                allPosts.forEach(post => {
                    if (post.category) categories.add(post.category);
                });
                populateCategoryFilter();

                loadingDiv.style.display = 'none';
                renderPosts(allPosts);

            } catch (error) {
                console.error('Error loading posts:', error);
                loadingDiv.innerHTML = 'Error loading posts. Please try again later.';
            }
        }

        function renderPosts(posts) {
            const blogGrid = document.getElementById('blog-grid');
            const noResults = document.getElementById('noResults');
            
            blogGrid.innerHTML = '';
            
            if (posts.length === 0) {
                noResults.innerHTML = `
                    <div class="no-posts">
                        <div class="emoji">:&#60;</div>
                        <h2>There is no blog post published by Nati</h2>
                        <p>Check back later for interesting posts!</p>
                    </div>
                `;
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            
            posts.forEach(post => {
                const postHTML = `
                    <div class="blog-item">
                        <div class="blog-content">
                            <span class="post-date">${formatDate(post.date)}</span>
                            <span class="category-tag">${post.category}</span>
                            <h2>${post.title}</h2>
                            <p class="preview">${post.preview}</p>
                            <a href="blog-post.html?id=${post.id}" class="read-more">
                                Read More
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M5 12h14M12 5l7 7-7 7"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                `;
                blogGrid.innerHTML += postHTML;
            });
        }

        function formatDate(dateString) {
            // Handle YYYY.MM.DD format
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric'
            };
            
            // Replace dots with slashes for proper Date parsing
            const formattedDateString = dateString.replace(/\./g, '/');
            return new Date(formattedDateString).toLocaleDateString('en-US', options);
        }

        function populateCategoryFilter() {
            const categoryFilter = document.getElementById('categoryFilter');
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryFilter.appendChild(option);
            });
        }

        function filterAndSortPosts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const sortOption = document.getElementById('sortSelect').value;

            let filteredPosts = allPosts.filter(post => {
                const matchesSearch = 
                    post.title.toLowerCase().includes(searchTerm) ||
                    post.preview.toLowerCase().includes(searchTerm);
                const matchesCategory = 
                    categoryFilter === 'all' || post.category === categoryFilter;
                return matchesSearch && matchesCategory;
            });

            switch(sortOption) {
                case 'newest':
                    filteredPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
                    break;
                case 'oldest':
                    filteredPosts.sort((a, b) => new Date(a.date) - new Date(b.date));
                    break;
                case 'az':
                    filteredPosts.sort((a, b) => a.title.localeCompare(b.title));
                    break;
                case 'za':
                    filteredPosts.sort((a, b) => b.title.localeCompare(a.title));
                    break;
            }

            renderPosts(filteredPosts);
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', filterAndSortPosts);
        document.getElementById('categoryFilter').addEventListener('change', filterAndSortPosts);
        document.getElementById('sortSelect').addEventListener('change', filterAndSortPosts);

        // Initialize
        window.addEventListener('load', loadPosts);
    </script>

    <style>
        .blog-container {
            padding: 120px 5% 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .blog-container h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Controls Styling */
        .blog-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid var(--gray-text);
            background: var(--darker-bg);
            color: var(--light-text);
            border-radius: 6px;
        }

        .filter-sort-controls {
            display: flex;
            gap: 15px;
        }

        .control-item {
            padding: 12px 20px;
            border: 1px solid var(--gray-text);
            background: var(--darker-bg);
            color: var(--light-text);
            border-radius: 6px;
            cursor: pointer;
        }

        /* Updated Blog Layout Styles */
        .blog-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .blog-item {
            background: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 0 30px 0;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Remove card-specific styles */
        .blog-item::before {
            display: none;
        }

        .blog-item:hover {
            transform: none;
            box-shadow: none;
        }

        .blog-content {
            padding: 0;
        }

        .post-date {
            display: block;
            color: var(--gray-text);
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .category-tag {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border-radius: 15px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .blog-item h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: var(--light-text);
        }

        .preview {
            color: var(--gray-text);
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #3498db;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .read-more:hover {
            color: #2ecc71;
        }

        .read-more svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .read-more:hover svg {
            transform: translateX(5px);
        }

        /* Update the controls to match the new style */
        .blog-controls {
            max-width: 800px;
            margin: 0 auto 30px;
        }

        /* Update animations for list style */
        .blog-item {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .blog-grid {
                padding: 20px;
            }

            .blog-item h2 {
                font-size: 1.5em;
            }

            .preview {
                font-size: 1em;
            }
        }

        /* No Posts Message */
        .no-posts {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-text);
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</body>
</html>
